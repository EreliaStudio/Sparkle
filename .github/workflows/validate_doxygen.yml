name: Validate Doxygen documentation

# Controls when the workflow will run
on:
  workflow_dispatch:

jobs:

  CMakeBuild:
    runs-on: windows-latest

    env:
      CMAKE_TOOLCHAIN_FILE: C:\vcpkg\scripts\buildsystems\vcpkg.cmake
      VCPKG_ROOT: C:\vcpkg
      # Path containing the CMakeLists.txt for the tests.
      SOURCE_PATH: ${{ github.workspace }}
      # Path of the top-level folder for build output.
      BUILD_PATH: ${{ github.workspace }}\build

    steps:
    - uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        vcpkg install
        choco install ninja lcov

    - name: Configure the project with CMake
      run: cmake --preset test

    - name: Configure the project with CMake
      run: cmake --build --preset test

    - name: Build tests
      run: |
        cd ${{ env.BUILD_PATH }}
        ctest

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: cmake_build
        path: ${{ env.BUILD_PATH }}


  CodeCoverage:
    needs: CMakeBuild
    runs-on: ubuntu-latest

    env:
      # Path of the top-level folder for build output.
      BUILD_PATH: ${{ github.workspace }}/build/test
      # Path to save the coverage data file to.
      COVERAGE_DATA_PATH: ${{ github.workspace }}/coverage.info

    steps:
    - uses: actions/checkout@v2

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: cmake_build
        path: build

    - name: Build tests
      run: ls -lhaR build/

